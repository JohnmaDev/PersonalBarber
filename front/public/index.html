<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="<%= BASE_URL %>PersonalBarber.svg">

  <!-- SEO Meta Tags -->
  <title>PersonalBarber | Barbería Premium & Sistema de Reservas</title>
  <meta name="description"
    content="PersonalBarber: La mejor barbería para reflejar tu mejor versión. Reserva tu cita online de forma rápida y segura. Cortes premium, barba y productos especializados.">
  <meta name="keywords"
    content="barbería, barbero, reserva de cita, corte de cabello, barber shop, personalbarber, medellín, colombia">
  <meta name="author" content="PersonalBarber">
  <meta name="google-site-verification" content="ZkoAKqzuvPxsdfXU7SsMO_iKDZPPMCsq3eOE99VzCEQ" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://personalbarber.netlify.app/">
  <meta property="og:title" content="PersonalBarber | Barbería Premium & Sistema de Reservas">
  <meta property="og:description" content="Reflejá tu mejor versión en PersonalBarber. Reserva tu cita online ahora.">
  <meta property="og:image" content="https://personalbarber.netlify.app/hero_barber.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://personalbarber.netlify.app/">
  <meta property="twitter:title" content="PersonalBarber | Barbería Premium & Sistema de Reservas">
  <meta property="twitter:description" content="Reflejá tu mejor versión en PersonalBarber. Reserva tu cita online ahora.">
  <meta property="twitter:image" content="https://personalbarber.netlify.app/hero_barber.png">

  <!-- Theme Color and Mobile Optimization -->
  <meta name="theme-color" content="#0A0A0A">
  <link rel="canonical" href="https://personalbarber.netlify.app/">
  <style>
    /* Prevent FOUC and improve font loading */
    @font-face {
      font-family: 'Font Awesome 5 Free';
      font-display: swap;
    }

    @font-face {
      font-family: 'Font Awesome 6 Free';
      font-display: swap;
    }

    @font-face {
      font-family: 'Inter';
      font-display: swap;
    }

    /* Global fallback for any auto-injected fonts */
    * {
      font-display: swap;
    }
  </style>
  <!-- Cloudinary Upload Widget -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>

<body>
  <noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
  </noscript>
  <div id="app"></div>
  <!-- built files will be auto injected -->
</body>

</html>
