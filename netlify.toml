[build]
  base = "."
  command = "cd Front && npm install && npm run build"
  publish = "Front/dist"
  functions = "backend/functions"

[build.environment]
  GO_VERSION = "1.21"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
